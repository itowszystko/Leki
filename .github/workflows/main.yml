name: Generate PDF

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-pdf:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v4 

      - name: Install
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y pandoc
          pip install weasyprint

      - name: Fix tables
        run: python3 .github/fix_tables.py

      - name: Build PDF
        run: |
          CSS=$(find . -name "book_style.css" | head -1)
          find . -name "*.md" | grep -v "README\|PLAN\|readme\|plan\|\.git" | sort > /tmp/files.txt
          xargs cat < /tmp/files.txt > /tmp/master.md
          pandoc /tmp/master.md -o book.pdf --pdf-engine=weasyprint --css="$CSS" --toc --toc-depth=3 --metadata title="Bezpieczenstwo podan IV w OIT" --metadata lang=pl
          ls -lh book.pdf

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ksiazka-pdf
          path: book.pdf
          retention-days: 30
