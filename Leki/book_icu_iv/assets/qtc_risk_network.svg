<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 440" width="680" height="440" role="img" aria-labelledby="qtc-title">
  <title id="qtc-title">Sieć interakcji QT-prolongacyjnych</title>

  <defs>
    <style>
      text { font-family: "Inter", "Helvetica Neue", Arial, sans-serif; }
      .node-label { font-size: 10.5px; font-weight: 600; }
      .node-sm    { font-size: 9px;    font-weight: 600; }
      .edge-label { font-size: 9px; font-weight: 700; fill: #FFFFFF; }
      .legend-text { font-size: 10px; fill: #52525B; }
      .legend-title { font-size: 10px; font-weight: 700; fill: #0C1F3F; }
      .caption { font-size: 10px; fill: #6B6B8A; font-style: italic; }
      .title-text { font-size: 13px; font-weight: 700; fill: #0C1F3F; }
    </style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="rgba(0,0,0,0.15)" />
    </filter>
  </defs>

  <rect width="680" height="440" fill="#FAFAF9" rx="8" />
  <text x="24" y="28" class="title-text">Sieć interakcji QT-prolongacyjnych w OIT</text>

  <!-- KRAWĘDZIE -->
  <line x1="340" y1="110" x2="155" y2="258" stroke="#7F1D1D" stroke-width="4" stroke-linecap="round" />
  <rect x="233" y="175" width="18" height="14" rx="7" fill="#7F1D1D" />
  <text x="242" y="186" class="edge-label" text-anchor="middle">C</text>

  <line x1="340" y1="110" x2="525" y2="258" stroke="#7F1D1D" stroke-width="3" stroke-linecap="round" />
  <rect x="421" y="175" width="18" height="14" rx="7" fill="#7F1D1D" />
  <text x="430" y="186" class="edge-label" text-anchor="middle">C</text>

  <line x1="155" y1="258" x2="525" y2="258" stroke="#DC2626" stroke-width="2.5" stroke-linecap="round" />
  <rect x="331" y="247" width="18" height="14" rx="7" fill="#DC2626" />
  <text x="340" y="258" class="edge-label" text-anchor="middle">H</text>

  <line x1="265" y1="385" x2="155" y2="258" stroke="#D97706" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="6,3" />
  <rect x="203" y="316" width="18" height="14" rx="7" fill="#D97706" />
  <text x="212" y="327" class="edge-label" text-anchor="middle">M</text>

  <line x1="455" y1="385" x2="340" y2="110" stroke="#D97706" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="6,3" />
  <rect x="391" y="241" width="18" height="14" rx="7" fill="#D97706" />
  <text x="400" y="252" class="edge-label" text-anchor="middle">M</text>

  <!-- WĘZŁY — r=42 dla głównych (80px diameter — nazwy mieszczą się w jednej linii) -->

  <!-- Amiodaron — 9 liter mieści się na r=42 -->
  <circle cx="340" cy="110" r="42" fill="#991B1B" filter="url(#shadow)" />
  <text x="340" y="114" class="node-label" fill="#FFFFFF" text-anchor="middle">Amiodaron</text>

  <!-- Haloperidol — 11 liter, r=42 -->
  <circle cx="155" cy="258" r="42" fill="#C05621" filter="url(#shadow)" />
  <text x="155" y="262" class="node-label" fill="#FFFFFF" text-anchor="middle">Haloperidol</text>

  <!-- Flukonazol — 10 liter, r=42 -->
  <circle cx="525" cy="258" r="42" fill="#1D4775" filter="url(#shadow)" />
  <text x="525" y="262" class="node-label" fill="#FFFFFF" text-anchor="middle">Flukonazol</text>

  <!-- Metoklopramid — 13 liter, r=38, font=8.5px -->
  <circle cx="265" cy="385" r="38" fill="#52525B" filter="url(#shadow)" />
  <text x="265" y="389" class="node-sm" fill="#FFFFFF" text-anchor="middle" font-size="8.5px">Metoklopramid</text>

  <!-- Mykafungina — 11 liter, r=38 -->
  <circle cx="455" cy="385" r="38" fill="#52525B" filter="url(#shadow)" />
  <text x="455" y="389" class="node-sm" fill="#FFFFFF" text-anchor="middle">Mykafungina</text>

  <!-- LEGENDA -->
  <rect x="488" y="298" width="176" height="120" rx="6" fill="white" stroke="#D4D4D0" stroke-width="1" />
  <text x="500" y="316" class="legend-title">Grubość linii = ryzyko TdP</text>

  <line x1="500" y1="334" x2="534" y2="334" stroke="#7F1D1D" stroke-width="4" stroke-linecap="round" />
  <rect x="538" y="326" width="14" height="12" rx="6" fill="#7F1D1D" />
  <text x="545" y="336" class="edge-label" text-anchor="middle" font-size="8px">C</text>
  <text x="560" y="338" class="legend-text" font-size="9.5px">Katastrofalne (NZK)</text>

  <line x1="500" y1="354" x2="534" y2="354" stroke="#DC2626" stroke-width="2.5" stroke-linecap="round" />
  <rect x="538" y="346" width="14" height="12" rx="6" fill="#DC2626" />
  <text x="545" y="356" class="edge-label" text-anchor="middle" font-size="8px">H</text>
  <text x="560" y="358" class="legend-text" font-size="9.5px">Wysokie (TdP)</text>

  <line x1="500" y1="374" x2="534" y2="374" stroke="#D97706" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="6,3" />
  <rect x="538" y="366" width="14" height="12" rx="6" fill="#D97706" />
  <text x="545" y="376" class="edge-label" text-anchor="middle" font-size="8px">M</text>
  <text x="560" y="378" class="legend-text" font-size="9.5px">Umiarkowane</text>

  <line x1="500" y1="394" x2="534" y2="394" stroke="#A1A1AA" stroke-width="1" stroke-dasharray="2,4" />
  <text x="540" y="398" class="legend-text" font-size="9px" fill="#A1A1AA">--- brak danych Y-site</text>

  <text x="340" y="430" class="caption" text-anchor="middle">Grubość połączenia = ciężkość ryzyka TdP. Linie przerywane = brak pełnych danych.</text>
</svg>
