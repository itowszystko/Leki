const DRUGS=[
{n:"Ampicylina",

 pharm:{p:"H",s:"H",ev:"Inaktywacja amikacyny przez kontakt. Aminoglikozydy tracą do 100% aktywności.",mit:"Nigdy przez ten sam lumen co amikacyna. Minimum 60 min przerwy sekwencyjnej."},
 proc:{p:"M",s:"M",ev:"pH ~10 — ból żylny przy szybkim podaniu. Przypadkowy szybki bolus = ból, drażnienie żyły.",mit:"Wolny wlew ≥15 min. Rozcieńczyć do 100 ml."}},
{n:"Amp+sulbaktam",
 phys:{p:"M",s:"H",ev:"Jak ampicylina. Sulbaktam niestabilny w G5.",mit:"Tylko NaCl. Osobna linia od aminoglikozydów."},

{n:"Pip+tazobaktam",

 pharm:{p:"VH",s:"C",ev:"Inaktywacja amikacyny przez pip+taz — nawet w oddzielnych liniach przy krótkim odstępie czasowym.",mit:"Amikacyna wyłącznie przez osobną linię (wenflon). TDM amikacyny."},
 proc:{p:"M",s:"H",ev:"Podanie amikacyny bezpośrednio po pip+taz przez ten sam lumen bez przepłukania.",mit:"Protokół obligatoryjny: 30 ml NaCl + 60 min przerwa minimum."}},
{n:"Ceftriakson",
 phys:{p:"VH",s:"C",ev:"Natychmiastowe wytrącenie soli Ca-ceftriaksonowej przy kontakcie z CaCl₂/Ca-glukonian. Mikrokryształy w linii. FDA Black Box.",mit:"Absolutnie osobna linia od wapnia. Nigdy przez ten sam lumen co CaCl₂."},
 pharm:{p:"M",s:"H",ev:"Inaktywacja przy kontakcie z aminoglikozydami.",mit:"Osobna linia od amikacyny."},
 proc:{p:"H",s:"C",ev:"Podanie CaCl₂ przez linię po ceftriaksonie bez przepłukania. Krzyżowe podanie przez wspólny trójnik.",mit:"Wizualna kontrola linii przed każdym bolusem wapnia. 30 ml NaCl flush po ceftriaksonie przed jakimkolwiek innym lekiem."}},
{n:"Meropenem",
 phys:{p:"M",s:"M",ev:"Degradacja w G5 po 1h (bez widocznych zmian). Niezgodność z NaHCO₃.",mit:"G5: wymiana worka co 1h lub preferuj NaCl. Nie mieszać z NaHCO₃."},
 pharm:{p:"VH",s:"C",ev:"Obniżenie VPA o 60–100% przez inhibicję enzymatyczną — niezależne od linii IV.",mit:"Monitoring stężenia VPA 2×/dobę przy włączeniu meropenemu. Rozważyć zamianę AED."},

{n:"Wankomycyna",

 pharm:{p:"H",s:"H",ev:"Addytywna nefrotoksyczność z amikacyną. Ototoksyczność. Red Man Syndrome przy szybkim podaniu.",mit:"TDM (vanko: AUC/MIC). Unikać jednoczesnej amikacyny bez monitorowania nerek. Wlew ≥60 min/1g."},
 proc:{p:"H",s:"H",ev:"Zbyt szybki wlew (np. flush przez linię po wanko) → Red Man Syndrome. Hipotensja, bradykardia.",mit:"Pompa z ustawionym czasem. Flush po wanko powolny — max 20 ml NaCl w ciągu 5 min."}},
{n:"Amikacyna",
 phys:{p:"VH",s:"C",ev:"Inaktywacja przez WSZYSTKIE beta-laktamy w linii. Dead space trójnika wystarczy.",mit:"Absolutnie własna linia (wenflon). TDM."},

{n:"Klindamycyna",
 phys:{p:"L",s:"M",ev:"Wytrącenie z aminoglikozydami przy bezpośrednim mieszaniu.",mit:"Osobna linia. Nie mieszać bezpośrednio."},

 proc:{p:"VH",s:"C",ev:"BOLUS lub zbyt szybki wlew = blok nerwowo-mięśniowy + kardiotoksyczność → NZK. Najniebezpieczniejszy błąd proceduralny tej grupy.",mit:"Pompa obligatoryjna. Limit szybkości. Min 60 min/600 mg. Nigdy ręczny push. Nigdy flush przyspieszający."}},
{n:"TMP+SMX",

 pharm:{p:"M",s:"H",ev:"Hamowanie metabolizmu VPA (TMP). Potencjalizacja działania leków nerkopochodnych.",mit:"Monitoring VPA przy jednoczesnym stosowaniu."},
 proc:{p:"M",s:"M",ev:"Krystalizacja w linii nierozpoznana — zakrzep linii lub zator.",mit:"Wizualna kontrola każdego wlewu TMP+SMX."}},
{n:"Tigecyklina",
 phys:{p:"M",s:"H",ev:"Degradacja fotochemiczna bez zmiany barwy roztworu.",mit:"Folia aluminiowa na cały zestaw przez cały czas wlewu."},
 pharm:{p:"L",s:"M",ev:"Ograniczone dane Y-site z lekami OIT.",mit:"Osobna linia gdy brak danych."},
 proc:{p:"H",s:"H",ev:"Brak osłony świetlnej — lek nieaktywny ale pozornie podany. Najczęstszy błąd przy tigecyklinie.",mit:"Obowiązkowa folia. Protokół przygotowania uwzględnia osłonę."}},
{n:"Fosfomycyna",
 phys:{p:"M",s:"M",ev:"pH 9–11 — wytrącenie z aminoglikozydami. G5 — brak danych.",mit:"NaCl. Osobna linia od aminoglikozydów."},
 pharm:{p:"M",s:"H",ev:"Duże ładunki Na⁺ (15 mmol/g) — hipersodemia, przeciążenie płynowe.",mit:"Bilans sodu. Uwaga u pacjentów z NS i hipernatremią."},
 proc:{p:"L",s:"M",ev:"Nieuwzględnienie ładunku sodowego.",mit:"Kalkulacja bilansu Na przy dawkowaniu."}},
{n:"Flukonazol",
 phys:{p:"L",s:"L",ev:"Szeroka kompatybilność fizyczna.",mit:"Standardowe monitorowanie."},
 pharm:{p:"VH",s:"H",ev:"Silna inhibicja CYP3A4 → istotny wzrost stężeń midazolamu i fentanylu (wielkość efektu jest zmienna osobniczo — może być kilkukrotna). Addytywne wydłużenie QT z amiodароnem i haloperydolem.",mit:"Po włączeniu flukonazolu: zmniejsz dawkę midazolamu i titruj wg efektu klinicznego (RASS). Nie stosuj automatycznej redukcji o stały %. EKG monitoring QT."},
 proc:{p:"H",s:"H",ev:"Brak modyfikacji dawki midazolamu/fentanylu przy włączeniu flukonazolu — nadmierna sedacja, depresja oddechowa.",mit:"Protokół: weryfikacja sedacji co 4h po włączeniu flukonazolu."}},
{n:"Kaspofungina",
 phys:{p:"H",s:"H",ev:"Utrata aktywności w G5/G10 — niezgodność nośnikowa. Flush G5 przez linię kaspofunginy = dezaktywacja w dead space.",mit:"WYŁĄCZNIE NaCl 0,9%. Flush tylko NaCl."},
 pharm:{p:"L",s:"M",ev:"Ograniczone interakcje farmakodynamiczne.",mit:"Standardowe."},
 proc:{p:"H",s:"H",ev:"G5 jako nośnik lub do przepłukania — błąd wykonawczy powodujący utratę leku.",mit:"Wyraźny label na strzykawce/worku: NaCl ONLY."}},
{n:"Mykafungina",
 phys:{p:"L",s:"L",ev:"Szeroka kompatybilność. G5 i NaCl — OK.",mit:"Standardowe."},
 pharm:{p:"L",s:"M",ev:"Addytywne QT z innymi lekami QT (niskie ryzyko).",mit:"Standard."},
 proc:{p:"L",s:"L",ev:"Brak krytycznych.",mit:"Standard."}},
{n:"Noradrenalina",
 phys:{p:"VH",s:"C",ev:"Inaktywacja przez alkalia (NaHCO₃, furosemid, esomeprazol) w dead space trójnika — natychmiastowa.",mit:"Własny port dystalny CVC. Zero innych leków przez ten port."},
 pharm:{p:"H",s:"C",ev:"Każda zmiana dawki opóźniona o dead space/przepływ. Niewidoczna przerwa przy zmianie strzykawki.",mit:"Minimalizacja dead space. Priming nowej strzykawki. Ciągłe monitorowanie hemodynamiczne."},
 proc:{p:"VH",s:"C",ev:"Flush przez linię noradrenaliny = niecelowy bolus presyjny → nagła hipertensja, arytmia. Zmiana strzykawki bez primingu = przerwa w dawce.",mit:"Technika priming obligatoryjna. Bez flushu przez ten port. Protokół zmiany strzykawki."}},
{n:"Adrenalina",
 phys:{p:"VH",s:"C",ev:"Inaktywacja przez NaHCO₃ i alkalia. Oksydacja — brązowienie = nieaktywna.",mit:"Własna linia. Brak NaHCO₃ w tej samej linii."},
 pharm:{p:"H",s:"C",ev:"Jak noradrenalina. Poza NZK — bolus = ciężka hipertensja.",mit:"Pompa ciągła. Bolus tylko w NZK."},
 proc:{p:"H",s:"C",ev:"Bolus poza NZK przez niedopatrzenie (np. push przez linię) = nagła hipertensja/arytmia.",mit:"Własna linia. Zakaz ręcznego pusha."}},
{n:"Dopamina",
 phys:{p:"H",s:"C",ev:"Inaktywacja przez NaHCO₃ natychmiastowa. Niezgodna z furosemidem.",mit:"Własny port CVC. Brak alkaliów w tej linii."},
 pharm:{p:"H",s:"H",ev:"Addytywna tachykardia z dobutaminą. Zmiany hemodynamiczne przy zmianie dawki.",mit:"Pompa. Monitorowanie HR."},
 proc:{p:"H",s:"C",ev:"Bolus/flush → nagłe zmiany hemodynamiczne.",mit:"Pompa ciągła. Priming."}},
{n:"Dobutamina",
 phys:{p:"H",s:"H",ev:"Wytrącenie z furosemidem (natychmiastowe). Inaktywacja przez NaHCO₃.",mit:"Osobna linia od furosemidu."},
 pharm:{p:"H",s:"H",ev:"Addytywna tachykardia/arytmia z innymi katecholaminami.",mit:"Monitorowanie EKG."},
 proc:{p:"H",s:"H",ev:"Bolus = nagłe zmiany HR/BP.",mit:"Pompa ciągła."}},
{n:"Digoksyna",
 phys:{p:"H",s:"H",ev:"Adsorpcja do plastiku — utrata dawki. Wytrącenie przy pH zmienionym.",mit:"Zestaw szklany lub low-adsorption."},
 pharm:{p:"VH",s:"C",ev:"Amiodaron znacząco podnosi stężenie digoksyny (hamowanie P-gp — efekt może być zbliżony do podwojenia, ale wartość zmienna). Furosemid → hipokaliemia → toksyczność digoksyny wzrasta. Wąski indeks terapeutyczny.",mit:"TDM digoksyny. Przy włączeniu amiodaronu: rozważ redukcję dawki digoksyny i monitoruj stężenie (wyjściowe 50% to startowy punkt, dostosuj wg TDM). Suplementacja K⁺."},
 proc:{p:"H",s:"C",ev:"Szybki bolus = bradykardia, blok AV, NZK. Adsorpcja do plastiku nierozpoznana = zmienna dawka.",mit:"Szkło. Wolne IV ≥10 min. EKG monitoring."}},
{n:"Metoprolol",
 phys:{p:"L",s:"L",ev:"Brak istotnych.",mit:"Standardowe."},
 pharm:{p:"H",s:"H",ev:"Addytywna bradykardia z digoksyną i amiodароnem.",mit:"Monitorowanie HR/EKG. Ostrożność u pacjentów na amiodaronie."},
 proc:{p:"M",s:"H",ev:"Szybki bolus = bradykardia, blok AV.",mit:"Wolny bolus 1–2 min. Monitorowanie."}},
{n:"Amiodaron",
 phys:{p:"VH",s:"C",ev:"Wytrącenie w NaCl (natychmiastowe). Adsorpcja do PVC + ekstrakcja DEHP. Liniowy kontakt z innymi lekami w G5.",mit:"G5 + pojemnik szklany/non-PVC + folia aluminiowa. Własny port."},
 pharm:{p:"VH",s:"C",ev:"Podwojenie stężenia digoksyny. QT addytywne z haloperydolem (TdP), flukonazolem. Wzrost stężenia teofiliny.",mit:"TDM. EKG monitoring QTc co 6h. Redukcja digoksyny 50%. Unikać jednoczesnego haloperydolu."},
 proc:{p:"H",s:"H",ev:"Podanie w NaCl lub przez PVC — lek nieaktywny lub utracony. Bolus poza NZK = hipotensja.",mit:"Obowiązkowa weryfikacja nośnika (G5) i pojemnika (non-PVC) przed każdym podaniem."}},
{n:"Nitrogliceryna",
 phys:{p:"VH",s:"C",ev:"Adsorpcja do PVC — utrata 50–80% dawki. Niewidoczna.",mit:"Non-PVC specjalny. Szklany pojemnik."},

{n:"Furosemid",

{n:"Nimodypina",

const PCLS={VH:"pc1",H:"pc1",M:"pc2",L:"pc3"};
const SCLS={C:"sc1",H:"sc2",M:"sc2",L:"sc3"};

function riskScore(p,s){
  const pm={VH:4,H:3,M:2,L:1};
  const sm={C:4,H:3,M:2,L:1};
  return pm[p]*sm[s];
}
function rowBg(p,s){
  const sc=riskScore(p,s);
  if(sc>=12) return "risk-cell-crit";
  if(sc>=6) return "risk-cell-high";
  if(sc>=3) return "risk-cell-med";
  return "risk-cell-low";
}

function show(id){
  ['matrix','phys','pharm','proc','top'].forEach(x=>document.getElementById('p-'+x).classList.remove('active'));
  document.getElementById('p-'+id).classList.add('active');
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['matrix','phys','pharm','proc','top'][i]===id));
  if(id==='matrix' && !document.getElementById('p-matrix').innerHTML) renderMatrix();
  if(id==='phys' && !document.getElementById('p-phys').innerHTML) renderCat('phys','Ryzyko fizyczne — wytrącenie i zator');
  if(id==='pharm' && !document.getElementById('p-pharm').innerHTML) renderCat('pharm','Ryzyko farmakologiczne — interakcje i utrata działania');
  if(id==='proc' && !document.getElementById('p-proc').innerHTML) renderCat('proc','Ryzyko proceduralne — bolus, pompa, tempo');
  if(id==='top' && !document.getElementById('p-top').innerHTML) renderTop();
}

let mBuilt=false;
function renderMatrix(){

  const el=document.getElementById('p-matrix');
  const q_el=document.createElement('div');
  q_el.className='row-f';
  q_el.innerHTML='<input type="text" id="mq" placeholder="Szukaj leku..." oninput="filterMatrix()"><select id="ms" onchange="filterMatrix()"><option value="">Wszystkie</option><option value="VH">Bardzo wysokie</option><option value="H">Wysokie</option><option value="M">Umiarkowane</option><option value="L">Niskie</option></select>';

  const cnt=document.createElement('div');
  cnt.className='cnt'; cnt.id='mcnt';
  el.appendChild(cnt);

  wrap.className='scroll';
  wrap.innerHTML=`<table><thead><tr>
    <th style="min-width:120px">Lek</th>
    <th>Fiz.P.</th><th>Fiz.C.</th>

  const s=document.getElementById('ms')?.value||'';
  const rows=DRUGS.filter(d=>{
    const maxP=[d.phys.p,d.pharm.p,d.proc.p].find(p=>p==='VH')||[d.phys.p,d.pharm.p,d.proc.p].find(p=>p==='H')||'L';
    return (!q||d.n.toLowerCase().includes(q)) && (!s||d.phys.p===s||d.pharm.p===s||d.proc.p===s);
  });
  document.getElementById('mcnt').textContent='Wyświetlono: '+rows.length+' leków';
  document.getElementById('mbody').innerHTML=rows.map(d=>{
    const topMit=[d.phys,d.pharm,d.proc].reduce((a,b)=>riskScore(b.p,b.s)>riskScore(a.p,a.s)?b:a).mit;
    return `<tr>
      <td style="font-weight:500">${d.n}</td>
      <td class="${rowBg(d.phys.p,d.phys.s)}"><span class="${PCLS[d.phys.p]}">${d.phys.p}</span></td>
      <td class="${rowBg(d.phys.p,d.phys.s)}"><span class="${SCLS[d.phys.s]}">${d.phys.s}</span></td>
      <td class="${rowBg(d.pharm.p,d.pharm.s)}"><span class="${PCLS[d.pharm.p]}">${d.pharm.p}</span></td>
      <td class="${rowBg(d.pharm.p,d.pharm.s)}"><span class="${SCLS[d.pharm.s]}">${d.pharm.s}</span></td>
      <td class="${rowBg(d.proc.p,d.proc.s)}"><span class="${PCLS[d.proc.p]}">${d.proc.p}</span></td>
      <td class="${rowBg(d.proc.p,d.proc.s)}"><span class="${SCLS[d.proc.s]}">${d.proc.s}</span></td>
      <td style="font-size:10px">${topMit}</td>
    </tr>`;
  }).join('');
}

function renderCat(cat, title){
  const el=document.getElementById('p-'+cat);
  const fEl=document.createElement('div');
  fEl.className='row-f';
  fEl.innerHTML=`<input type="text" id="${cat}q" placeholder="Szukaj leku..." oninput="filterCat('${cat}')">
  <select id="${cat}s" onchange="filterCat('${cat}')">
    <option value="">Wszystkie</option><option value="VH">Bardzo wysokie</option>
    <option value="H">Wysokie</option><option value="M">Umiarkowane</option><option value="L">Niskie</option>
  </select>`;
  el.appendChild(fEl);
  const cnt=document.createElement('div');
  cnt.className='cnt'; cnt.id=cat+'cnt';
  el.appendChild(cnt);
  const wrap=document.createElement('div');
  wrap.className='scroll';
  wrap.innerHTML=`<table><thead><tr>
    <th style="min-width:130px">Lek</th>
    <th>Prawdopod.</th><th>Ciężkość</th>
    <th style="min-width:200px">Zdarzenie</th>
    <th style="min-width:200px">Jak ograniczyć</th>
  </tr></thead><tbody id="${cat}body"></tbody></table>`;
  el.appendChild(wrap);
  filterCat(cat);
}

function filterCat(cat){
  const q=(document.getElementById(cat+'q')?.value||'').toLowerCase();
  const s=document.getElementById(cat+'s')?.value||'';
  const rows=DRUGS.filter(d=>(!q||d.n.toLowerCase().includes(q))&&(!s||d[cat].p===s));
  document.getElementById(cat+'cnt').textContent='Wyświetlono: '+rows.length+' leków';
  document.getElementById(cat+'body').innerHTML=rows.map(d=>`
    <tr>
      <td style="font-weight:500">${d.n}</td>
      <td class="${rowBg(d[cat].p,d[cat].s)}"><span class="${PCLS[d[cat].p]}">${d[cat].p}</span></td>
      <td class="${rowBg(d[cat].p,d[cat].s)}"><span class="${SCLS[d[cat].s]}">${d[cat].s}</span></td>
      <td style="font-size:10px">${d[cat].ev}</td>
      <td style="font-size:10px">${d[cat].mit}</td>
    </tr>`).join('');
}

function renderTop(){
  const el=document.getElementById('p-top');
  const sorted=[...DRUGS].sort((a,b)=>{
    const sa=Math.max(riskScore(a.phys.p,a.phys.s),riskScore(a.pharm.p,a.pharm.s),riskScore(a.proc.p,a.proc.s));
    const sb=Math.max(riskScore(b.phys.p,b.phys.s),riskScore(b.pharm.p,b.pharm.s),riskScore(b.proc.p,b.proc.s));
    return sb-sa;
  }).slice(0,20);

  const cats=[
    {k:'proc',label:'Proceduralne',cls:'al-d'},
    {k:'phys',label:'Fizyczne',cls:'al-w'},
    {k:'pharm',label:'Farmakologiczne',cls:'al-i'},
  ];

  let html='<div style="font-size:11px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px">Top 20 leków wg maksymalnego ryzyka (wszystkie kategorie)</div>';
  sorted.forEach((d,i)=>{
    const maxCat=cats.reduce((a,b)=>riskScore(d[b.k].p,d[b.k].s)>riskScore(d[a.k].p,d[a.k].s)?b:a);
    const maxRisk=d[maxCat.k];
    html+=`<div class="alert-strip ${maxCat.cls}" style="margin-bottom:5px">
      <div style="display:flex;gap:8px;align-items:baseline;flex-wrap:wrap">
        <span style="font-weight:500;min-width:26px">${i+1}.</span>
        <span style="font-weight:500">${d.n}</span>
        <span class="b ${PCLS[maxRisk.p]}" style="margin-left:4px">${maxRisk.p}</span>
        <span class="b ${SCLS[maxRisk.s]}">${maxRisk.s}</span>
        <span style="font-size:10px;opacity:.7">(${maxCat.label})</span>
      </div>
      <div style="font-size:10px;margin-top:3px;line-height:1.5">${maxRisk.ev}</div>
      <div style="font-size:10px;margin-top:2px;font-weight:500">${maxRisk.mit}</div>
    </div>`;
  });
  el.innerHTML=html;
}

show('matrix');
</script>
