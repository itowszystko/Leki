
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-sans); font-size: 14px; color: var(--color-text-primary); }
  .container { padding: 1rem 0; }
  .tabs { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 1rem; border-bottom: 0.5px solid var(--color-border-tertiary); padding-bottom: 8px; }
  .tab { padding: 6px 14px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); cursor: pointer; font-size: 13px; background: transparent; color: var(--color-text-secondary); transition: all 0.15s; }
  .tab.active { background: var(--color-background-secondary); color: var(--color-text-primary); border-color: var(--color-border-primary); font-weight: 500; }
  .tab:hover:not(.active) { background: var(--color-background-secondary); }
  .panel { display: none; }
  .panel.active { display: block; }
  .search-row { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; align-items: center; }
  .search-row input, .search-row select { font-size: 13px; padding: 6px 10px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-primary); }
  .search-row input { flex: 1; min-width: 160px; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th { text-align: left; padding: 6px 8px; background: var(--color-background-secondary); font-weight: 500; font-size: 11px; color: var(--color-text-secondary); border-bottom: 0.5px solid var(--color-border-tertiary); position: sticky; top: 0; z-index: 2; }
  td { padding: 6px 8px; border-bottom: 0.5px solid var(--color-border-tertiary); vertical-align: top; line-height: 1.4; }
  tr:hover td { background: var(--color-background-secondary); }
  .badge { display: inline-block; padding: 2px 7px; border-radius: 10px; font-size: 11px; font-weight: 500; white-space: nowrap; }
  .badge-ok { background: #EAF3DE; color: #3B6D11; }
  .badge-no { background: #FCEBEB; color: #A32D2D; }
  .badge-nd { background: #F1EFE8; color: #5F5E5A; }
  .badge-cond { background: #FAEEDA; color: #854F0B; }
  .badge-warn { background: #FAEEDA; color: #854F0B; }
  .drug-name { font-weight: 500; color: var(--color-text-primary); }
  .drug-sub { font-size: 11px; color: var(--color-text-secondary); }
  .section-label { font-size: 11px; font-weight: 500; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.04em; margin: 1rem 0 0.4rem; }
  .scroll-wrap { overflow-x: auto; max-height: 520px; overflow-y: auto; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); }
  .critical-card { border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 12px 14px; margin-bottom: 8px; }
  .critical-card.danger { border-left: 3px solid #E24B4A; }
  .critical-card.warn { border-left: 3px solid #EF9F27; }
  .critical-card.info { border-left: 3px solid #378ADD; }
  .critical-card .pair { font-weight: 500; font-size: 13px; margin-bottom: 4px; }
  .critical-card .desc { font-size: 12px; color: var(--color-text-secondary); line-height: 1.5; }
  .critical-card .mechanism { font-size: 11px; color: var(--color-text-secondary); margin-top: 4px; font-style: italic; }
  .filter-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
  .filter-btn { padding: 4px 10px; border: 0.5px solid var(--color-border-secondary); border-radius: 10px; font-size: 12px; cursor: pointer; background: transparent; color: var(--color-text-secondary); }
  .filter-btn.on { background: var(--color-background-secondary); color: var(--color-text-primary); font-weight: 500; }
  .legend { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 10px; font-size: 12px; align-items: center; }
  .cat-tag { font-size: 11px; padding: 1px 6px; border-radius: 8px; background: var(--color-background-secondary); color: var(--color-text-secondary); }
  .conflict-note { background: #FAEEDA; color: #633806; border-radius: var(--border-radius-md); padding: 6px 10px; font-size: 12px; margin-top: 4px; }
  .info-note { background: #E6F1FB; color: #0C447C; border-radius: var(--border-radius-md); padding: 6px 10px; font-size: 12px; margin-top: 6px; }
  .bold { font-weight: 500; }
  @media (prefers-color-scheme: dark) {
    .badge-ok { background: #173404; color: #C0DD97; }
    .badge-no { background: #501313; color: #F7C1C1; }
    .badge-nd { background: #2C2C2A; color: #B4B2A9; }
    .badge-cond { background: #412402; color: #FAC775; }
    .badge-warn { background: #412402; color: #FAC775; }
    .conflict-note { background: #412402; color: #FAC775; }
    .info-note { background: #042C53; color: #B5D4F4; }
  }
</style>

<div class="container">
  <h2 style="sr-only">Baza danych kompatybilności leków dożylnych — OIT</h2>
  
  <div class="tabs">
    <button class="tab active" onclick="showPanel('drugs')">Leki — właściwości</button>
    <button class="tab" onclick="showPanel('bolus')">Podanie w bolusie</button>
    <button class="tab" onclick="showPanel('compat')">Kompatybilność</button>
    <button class="tab" onclick="showPanel('critical')">Krytyczne kombinacje</button>
  </div>

  <!-- PANEL 1: Drugs properties -->
  <div id="panel-drugs" class="panel active">
    <div class="search-row">
      <input type="text" id="drugSearch" placeholder="Szukaj leku..." oninput="filterDrugs()">
      <select id="catFilter" onchange="filterDrugs()">
        <option value="">Wszystkie kategorie</option>
        <option value="antybiotyk">Antybiotyki</option>
        <option value="grzyb">Przeciwgrzybicze</option>
        <option value="kardio">Kardio/OIT</option>
        <option value="neuro">Neurologia</option>
        <option value="sedacja">Sedacja/Analgezja</option>
        <option value="objawowe">Objawowe</option>
        <option value="hemato">Hematologia</option>
        <option value="oddech">Oddechowe</option>
        <option value="inne">Inne</option>
      </select>
    </div>
    <div class="scroll-wrap">
      <table id="drugsTable">
        <thead>
          <tr>
            <th style="min-width:140px">Lek</th>
            <th style="min-width:80px">pH</th>
            <th style="min-width:80px">NaCl 0,9%</th>
            <th style="min-width:80px">G5%</th>
            <th style="min-width:100px">Stabilność</th>
            <th style="min-width:100px">Światło/Temp</th>
            <th style="min-width:160px">Uwagi krytyczne</th>
          </tr>
        </thead>
        <tbody id="drugsBody"></tbody>
      </table>
    </div>
  </div>

  <!-- PANEL 2: Bolus -->
  <div id="panel-bolus" class="panel">
    <div class="search-row">
      <input type="text" id="bolusSearch" placeholder="Szukaj leku..." oninput="filterBolus()">
      <select id="bolusFilter" onchange="filterBolus()">
        <option value="">Wszystkie</option>
        <option value="TAK">Bolus TAK</option>
        <option value="NIE">Bolus NIE</option>
        <option value="WARUNKOWO">Warunkowo</option>
      </select>
    </div>
    <div class="scroll-wrap">
      <table id="bolusTable">
        <thead>
          <tr>
            <th style="min-width:140px">Lek</th>
            <th style="min-width:80px">Bolus</th>
            <th style="min-width:100px">Czas podania</th>
            <th style="min-width:80px">Rozcieńczenie</th>
            <th style="min-width:220px">Ryzyka / warunki</th>
          </tr>
        </thead>
        <tbody id="bolusBody"></tbody>
      </table>
    </div>
  </div>

  <!-- PANEL 3: Compatibility matrix -->
  <div id="panel-compat" class="panel">
    <div class="legend">
      <span class="badge badge-ok">Zgodne</span>
      <span class="badge badge-no">Niezgodne</span>
      <span class="badge badge-cond">Warunkowo</span>
      <span class="badge badge-nd">Brak danych</span>
    </div>
    <div class="search-row">
      <input type="text" id="compatSearch" placeholder="Szukaj pary leków..." oninput="filterCompat()">
      <select id="compatResult" onchange="filterCompat()">
        <option value="">Wszystkie wyniki</option>
        <option value="Niezgodne">Tylko niezgodne</option>
        <option value="Zgodne">Tylko zgodne</option>
        <option value="Warunkowo">Tylko warunkowo</option>
        <option value="Brak danych">Brak danych</option>
      </select>
    </div>
    <div class="scroll-wrap">
      <table id="compatTable">
        <thead>
          <tr>
            <th>Lek A</th>
            <th>Lek B</th>
            <th>Wynik</th>
            <th>Nośnik</th>
            <th>Mechanizm / uwaga</th>
          </tr>
        </thead>
        <tbody id="compatBody"></tbody>
      </table>
    </div>
  </div>

  <!-- PANEL 4: Critical combinations -->
  <div id="panel-critical" class="panel">
    <div class="filter-row">
      <button class="filter-btn on" onclick="filterCritical('all', this)">Wszystkie</button>
      <button class="filter-btn" onclick="filterCritical('precipitate', this)">Wytrącenie</button>
      <button class="filter-btn" onclick="filterCritical('degradation', this)">Degradacja</button>
      <button class="filter-btn" onclick="filterCritical('hemodynamic', this)">Hemodynamiczne</button>
      <button class="filter-btn" onclick="filterCritical('activity', this)">Zmiana aktywności</button>
    </div>
    <div id="criticalList"></div>
  </div>
</div>

<script>
const DRUGS = [
  // ANTYBIOTYKI
  { name: "Ampicylina", cat: "antybiotyk", ph: "8,0–10,0", nacl: "ok", g5: "ok", stability: "NaCl/G5: 8h w temp. pokojowej, 48h w lodówce", light: "Nieznacząca wrażliwość", note: "Po rozp. w G5 — max 4h. Hydroliza przy pH<5 lub >10. Traci aktywność bez widocznych zmian po >8h w temp. pokojowej." },
  { name: "Ampicylina + sulbaktam", cat: "antybiotyk", ph: "8,0–10,0", nacl: "ok", g5: "nd", stability: "NaCl: 8h w temp. pokojowej, 24h w lodówce", light: "Chroni przed światłem", note: "G5 — sulbaktam niestabilny. W NaCl 0,9% — optymalne." },
  { name: "Piperacylina + tazobaktam", cat: "antybiotyk", ph: "4,5–6,8", nacl: "ok", g5: "ok", stability: "NaCl/G5: 12h 25°C, 48h 5°C; CIĄGŁY WLEW: 12h w strzykawce", light: "Brak wrażliwości", note: "W ciągłym wlewie — wymiana worka co 12h! Niekompatybilny z aminoglikozydami (wytrącenie). Konflikt danych z ceftriaksonem — unikać jednego światła." },
  { name: "Ceftriakson", cat: "antybiotyk", ph: "6,0–8,0", nacl: "ok", g5: "ok", stability: "NaCl/G5: 24h 25°C, 10 dni 5°C (0,1–0,4 g/ml)", light: "Chronić przed światłem po rozp.", note: "BEZWZGLĘDNIE NIEZGODNY z Ca²⁺ (nawet w różnych liniach, szczególnie noworodki). Niezgodny z aminoglikozydami. Przy >40 mg/ml — ryzyko wytrącenia." },
  { name: "Meropenem", cat: "antybiotyk", ph: "7,3–8,3", nacl: "ok", g5: "cond", stability: "NaCl: 4h w 25°C, 24h w 5°C. G5: TYLKO 1h w 25°C!", light: "Chronić", note: "W G5 — wyjątkowo krótka stabilność (1h). Nie stosować z NaHCO₃ (degradacja). Aktywność spada bez zmian wyglądu." },
  { name: "Vancomycin", cat: "antybiotyk", ph: "2,5–4,5", nacl: "ok", g5: "ok", stability: "NaCl/G5: 24h 25°C, 14 dni 5°C (rozcieńczone ≤5 mg/ml)", light: "Chronić", note: "Silnie żrący — konieczne rozcieńczenie min. do 5 mg/ml. Podanie szybsze niż 60 min → Vancomycin Flushing Syndrome (Red Man). pH<3,5 ryzyko wytrącenia z innymi lekami." },
  { name: "Amikacyna", cat: "antybiotyk", ph: "3,5–5,5", nacl: "ok", g5: "ok", stability: "NaCl/G5: 24h 25°C, 60 dni 5°C", light: "Stabilna", note: "Niezgodna z beta-laktamami (inaktywacja wzajemna). Podawać osobno lub z przerwą. Wskazówka: piperacylina inaktywuje amikacynę nawet w osobnych liniach przy długiej ekspozycji." },
  { name: "Klindamycyna", cat: "antybiotyk", ph: "5,5–7,0", nacl: "ok", g5: "ok", stability: "NaCl/G5: 16 mg/ml — 24h 25°C, 32 mg/ml — 8h", light: "Stabilna", note: "Nie podawać jako bolus (ryzyko NZK). Nierozcieńczona — bezwzględnie NIE." },
  { name: "Trimetoprim+sulfametoksazol", cat: "antybiotyk", ph: "9,5–10,5", nacl: "ok", g5: "ok", stability: "G5: 2–6h (zmętnienie możliwe po 6h). NaCl: do 8h", light: "Chronić", note: "W NaCl 0,9% — możliwe krystalizowanie (pH zależne). Wytrąca z kwaśnymi lekami. Przy pH<8 — wytrącenie sulfametoksazolu." },
  { name: "Tigecyklina", cat: "antybiotyk", ph: "7,8–8,5 (rekonstyt.)", nacl: "ok", g5: "ok", stability: "NaCl/G5: 24h 25°C, 48h 5°C. Niezwłocznie po rekonst.", light: "Chronić przed światłem BEZWZGLĘDNIE", note: "Wyjątkowo fotowrażliwa. Strzykawka/worek — osłonić folią. Rozkłada się bez widocznych zmian barwy." },

  // GRZYBY
  { name: "Flukonazol", cat: "grzyb", ph: "4,0–8,0", nacl: "ok", g5: "ok", stability: "Gotowy roztwór: 24h w temp. pokojowej", light: "Chronić", note: "Ostrożność z lekami wpływającymi na QT — potencjalizacja." },
  { name: "Kaspofungina", cat: "grzyb", ph: "6,6", nacl: "ok", g5: "no", stability: "NaCl 0,9%: 24h 25°C. NaCl 0,45%: OK", light: "Chronić przed bezpośrednim", note: "G5, G10 — NIEZGODNE (strąca przy pH wyższym od odtwarzanego). Tylko NaCl 0,9% lub 0,45% lub PWI." },
  { name: "Mykafungina", cat: "grzyb", ph: "5,0–7,0", nacl: "ok", g5: "ok", stability: "Po rozp: 24h 25°C, 48h 5°C", light: "Chronić przed długotrwałym", note: "Stabilna w G5. Zgodna z szerszym zakresem nośników niż kaspofungina." },

  { name: "Noradrenalina", cat: "kardio", ph: "3,0–4,5", nacl: "ok", g5: "ok", stability: "G5: 24h (preferowana). NaCl: 24h ale może przyspieszyć oksydację", light: "CHRONIĆ (fotodegradacja — brązowieje)", note: "G5 preferowana ze względu na pH. Niezgodna z zasadowymi roztworami (NaHCO₃, barbiturany). Oksydacja daje nieaktywny związek." },
  { name: "Adrenalina", cat: "kardio", ph: "2,5–5,0", nacl: "ok", g5: "ok", stability: "24h, w lodówce do 48h. Obserwować przebarwienie (różowe/brązowe = degradacja)", light: "CHRONIĆ bezwzględnie", note: "Kwaśne pH — niezgodność z zasadowymi lekami. Niekompatybilna z NaHCO₃ (natychmiastowa inaktywacja)." },

  { name: "Dobutamina", cat: "kardio", ph: "2,5–5,5", nacl: "ok", g5: "ok", stability: "Rozcieńczona: 24h 25°C, 48h 5°C. Zmiana koloru = degradacja", light: "Chronić", note: "Niezgodna z NaHCO₃ i zasadowymi roztworami. Strącenie z furosemidem." },
  { name: "Digoksyna", cat: "kardio", ph: "6,8–7,2", nacl: "ok", g5: "ok", stability: "Rozcieńczona: do 4h. Podawać niezwłocznie po rozcieńczeniu", light: "Chronić", note: "Adsorpcja do plastiku — stosować szkło lub dedykowane zestawy. Wąski indeks terapeutyczny — dokładność dawkowania krytyczna." },
  { name: "Metoprolol (Metocard)", cat: "kardio", ph: "6,0–7,0", nacl: "ok", g5: "ok", stability: "NaCl/G5: stabilny 24h", light: "Stabilny", note: "Wolne podanie IV — ryzyko bradykardii. Lek z wąskim oknem hemodynamicznym." },
  { name: "Amiodaron (Cordarone)", cat: "kardio", ph: "3,5–4,5", nacl: "no", g5: "ok", stability: "G5: 24h, max stężenie 2 mg/ml w plastiku PVC (adsorpcja!). G5 non-PVC: do 24h", light: "CHRONIĆ BEZWZGLĘDNIE — folia aluminiowa", note: "NaCl 0,9% — NIEZGODNY (wytrącenie). TYLKO G5. Zawiera benzalkoniowy — wrażliwe naczynie i ból w miejscu wkłucia. Adsorpcja do PVC — stosować pojemniki szklane lub non-PVC. Konflikt z wieloma lekami (QT)." },
  { name: "Nitrogliceryna (Trinitryl)", cat: "kardio", ph: "3,0–6,5", nacl: "ok", g5: "ok", stability: "NaCl/G5: 24h. ADSORPCJA do PVC — utrata do 80% dawki!", light: "Chronić bezwzględnie", note: "Stosować TYLKO pojemniki szklane lub non-PVC (specjalne zestawy do nitrogliceryny). Adsorpcja do PVC jest klinicznie istotna — niedoszacowanie dawki." },
  { name: "Urapidyl (Tachyben)", cat: "kardio", ph: "5,0–7,0", nacl: "ok", g5: "ok", stability: "NaCl/G5: 24h 25°C", light: "Chronić", note: "Niezgodny z zasadami. pH > 8 — wytrącenie." },

  { name: "Torasemid (Trifas)", cat: "kardio", ph: "8,5–9,5", nacl: "ok", g5: "ok", stability: "NaCl/G5: 24h", light: "Chronić", note: "Podobne interakcje do furosemidu. Niezgodny z kwaśnymi lekami." },
  { name: "Nimodypina", cat: "kardio", ph: "4,0–6,0", nacl: "ok", g5: "ok", stability: "Gotowy roztwór: 24h w 25°C — zgodnie z ChPL", light: "CHRONIĆ BEZWZGLĘDNIE — czarny owijacz dostarczany przez producenta", note: "Konieczny specjalny zestaw non-PVC (niekompatybilna z PVC — adsorpcja i ekstrakcja plastyfikatorów). Producent dostarcza zestaw." },

  { name: "Cerebrolysin", cat: "neuro", ph: "7,0–8,5", nacl: "ok", g5: "ok", stability: "Po rozcieńczeniu: zużyć w ciągu 24h, preferuj niezwłoczne podanie", light: "Chronić", note: "Wytrąca się z roztworami aminokwasów i emulsjami lipidów. Podawać osobno." },

let critFilter = 'all';

function showPanel(id) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('panel-' + id).classList.add('active');
  document.querySelectorAll('.tab')[['drugs','bolus','compat','critical'].indexOf(id)].classList.add('active');
  if (id === 'drugs') renderDrugs();
  if (id === 'bolus') renderBolus();
  if (id === 'compat') renderCompat();
  if (id === 'critical') renderCritical();
}

function badge(result) {
  if (result === 'Niezgodne') return '<span class="badge badge-no">Niezgodne</span>';
  if (result === 'Zgodne') return '<span class="badge badge-ok">Zgodne</span>';
  if (result === 'Warunkowo') return '<span class="badge badge-cond">Warunkowo</span>';
  if (result === 'Brak danych') return '<span class="badge badge-nd">Brak danych</span>';
  return result;
}
function bolusB(r) {
  if (r === 'NIE') return '<span class="badge badge-no">NIE</span>';
  if (r === 'TAK') return '<span class="badge badge-ok">TAK</span>';
  if (r === 'WARUNKOWO') return '<span class="badge badge-cond">WARUNKOWO</span>';
  return r;
}
function solventB(v) {
  if (v === 'ok') return '<span class="badge badge-ok">OK</span>';
  if (v === 'no') return '<span class="badge badge-no">NIE</span>';
  if (v === 'cond') return '<span class="badge badge-cond">Warunkowo</span>';
  return '<span class="badge badge-nd">ND</span>';
}

function renderDrugs(filter) {
  const q = (document.getElementById('drugSearch')?.value || '').toLowerCase();
  const cat = document.getElementById('catFilter')?.value || '';
  const rows = DRUGS.filter(d => {
    return (!q || d.name.toLowerCase().includes(q)) && (!cat || d.cat === cat);
  });
  document.getElementById('drugsBody').innerHTML = rows.map(d => `
    <tr>
      <td><span class="drug-name">${d.name}</span></td>
      <td>${d.ph}</td>
      <td>${solventB(d.nacl)}</td>
      <td>${solventB(d.g5)}</td>
      <td style="font-size:11px">${d.stability}</td>
      <td style="font-size:11px">${d.light}</td>
      <td style="font-size:11px">${d.note}</td>
    </tr>
  `).join('');
}

function filterDrugs() { renderDrugs(); }

function renderBolus() {
  const q = (document.getElementById('bolusSearch')?.value || '').toLowerCase();
  const f = document.getElementById('bolusFilter')?.value || '';
  const rows = BOLUS.filter(d => (!q || d.name.toLowerCase().includes(q)) && (!f || d.result === f));
  document.getElementById('bolusBody').innerHTML = rows.map(d => `
    <tr>
      <td><span class="drug-name">${d.name}</span></td>
      <td>${bolusB(d.result)}</td>
      <td style="font-size:12px">${d.time}</td>
      <td style="font-size:12px">${d.dilute}</td>
      <td style="font-size:11px">${d.risk}</td>
    </tr>
  `).join('');
}

function filterBolus() { renderBolus(); }

function renderCompat() {
  const q = (document.getElementById('compatSearch')?.value || '').toLowerCase();
  const f = document.getElementById('compatResult')?.value || '';
  const rows = COMPAT.filter(d => (!q || d.a.toLowerCase().includes(q) || d.b.toLowerCase().includes(q)) && (!f || d.result === f));
  document.getElementById('compatBody').innerHTML = rows.map(d => `
    <tr>
      <td style="font-size:12px;font-weight:500">${d.a}</td>
      <td style="font-size:12px;font-weight:500">${d.b}</td>
      <td>${badge(d.result)}</td>
      <td style="font-size:11px">${d.solvent}</td>
      <td style="font-size:11px">${d.note}</td>
    </tr>
  `).join('');
}

function filterCompat() { renderCompat(); }

function filterCritical(type, btn) {
  critFilter = type;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  renderCritical();
}

function renderCritical() {
  const items = critFilter === 'all' ? CRITICAL : CRITICAL.filter(c => c.type === critFilter);
  document.getElementById('criticalList').innerHTML = items.map(c => `
    <div class="critical-card ${c.level}">
      <div class="pair">${c.pair}</div>
      <div class="desc">${c.desc}</div>
      <div class="mechanism">Mechanizm: ${c.mech}</div>
    </div>
  `).join('');
}

renderDrugs();
</script>
