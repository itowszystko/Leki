const NEVER = BL.filter(x=>x.never);

function blItem(item, idx){
  const catCls = item.cat;
  const tLabel = item.time==='instant' ? `<span class="t-instant">${item.timeLabel}</span>` : `<span class="t-delay">${item.timeLabel}</span>`;
  return `<div class="bl-item">
    <div class="bl-head ${catCls}" onclick="toggleBl(${idx})">
      <div class="bl-title">${item.pair}</div>
      <span class="bx b${item.cat}">${item.cat==='A'?'Fizyczna':item.cat==='B'?'Chemiczna':'Kliniczna'}</span>
      ${item.never?`<span class="bx bN">NIGDY</span>`:''}
    </div>
    <div class="bl-body" id="blb_${idx}">
      <div class="bl-tags">
        <span class="bx b${item.cat}">${item.cat==='A'?'Niezgodność fizyczna':item.cat==='B'?'Niezgodność chemiczna':'Interakcja kliniczna'}</span>
        ${item.never?`<span class="bx bN">NIGDY W JEDNEJ LINII</span>`:''}
      </div>
      <div class="bl-row">
        <div class="bl-cell"><b>Mechanizm</b>${item.mech}</div>
        <div class="bl-cell"><b>Czas</b>${tLabel}<br>${item.time==='instant'?'Nie ma bezpiecznego marginesu':'Może przebiegać bez widocznych zmian'}</div>
        <div class="bl-cell"><b>Konsekwencja kliniczna</b>${item.cons}</div>
      </div>
    </div>
  </div>`;
}

function toggleBl(idx){
  const b=document.getElementById('blb_'+idx);
  b.classList.toggle('open');
}

function renderList(panelId, items){
  const el=document.getElementById('p-'+panelId);
  el.innerHTML=`
    <div class="row-f">
      <input type="text" id="q_${panelId}" placeholder="Szukaj pary..." oninput="filterList('${panelId}')">
      <select id="s_${panelId}" onchange="filterList('${panelId}')">
        <option value="">Wszystkie</option>
        <option value="instant">Natychmiast</option>
        <option value="delay">Opóźnione</option>
      </select>
    </div>
    <div class="cnt" id="cnt_${panelId}"></div>
    <div id="list_${panelId}"></div>`;
  filterList(panelId, items);
}

function filterList(panelId, sourceItems){
  const items = sourceItems || (panelId==='all' ? BL : BL.filter(x=>x.cat===panelId));
  const q=(document.getElementById('q_'+panelId)?.value||'').toLowerCase();
  const s=document.getElementById('s_'+panelId)?.value||'';
  const filtered=items.filter(x=>(!q||x.pair.toLowerCase().includes(q)||x.mech.toLowerCase().includes(q))&&(!s||x.time===s));
  document.getElementById('cnt_'+panelId).textContent='Wyświetlono: '+filtered.length+' kombinacji';
  const globalIdx = (item)=>BL.indexOf(item);
  document.getElementById('list_'+panelId).innerHTML=filtered.map(item=>blItem(item, globalIdx(item))).join('');
}

function renderNever(){
  const el=document.getElementById('p-never');
  el.innerHTML=`<div class="section-title">Lista NIGDY W JEDNEJ LINII — ${NEVER.length} kombinacji bezwzględnie zakazanych</div>
    <div style="font-size:11px;color:var(--color-text-secondary);margin-bottom:12px">Bez warunków. Bez "raczej". Bez wyjątków. Każda z tych kombinacji — w tej samej linii, przez ten sam port, jednocześnie lub bez odpowiedniego przepłukania — jest niedopuszczalna. <b>Uwaga:</b> Interakcje czysto farmakodynamiczne (np. amiodaron + haloperydol, meropenem + VPA) nie są tutaj ujęte, bo dotyczą jednoczesnego stosowania niezależnie od linii — patrz zakładka C — Kliniczne.</div>
    <div class="never-grid">
    ${NEVER.map(item=>`
      <div class="never-card">
        <div class="nc-pair">${item.pair}</div>
        <div class="nc-why">${item.mech}</div>
        <div class="nc-time">${item.timeLabel}</div>
        <div class="nc-cons">${item.cons}</div>
      </div>`).join('')}
    </div>`;
}

function show(id){
  ['all','A','B','C','never'].forEach(x=>document.getElementById('p-'+x).classList.remove('active'));
  document.getElementById('p-'+id).classList.add('active');
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['all','A','B','C','never'][i]===id));
  if(id==='all'&&!document.getElementById('p-all').innerHTML) renderList('all',BL);
  if(id==='A'&&!document.getElementById('p-A').innerHTML) renderList('A',BL.filter(x=>x.cat==='A'));
  if(id==='B'&&!document.getElementById('p-B').innerHTML) renderList('B',BL.filter(x=>x.cat==='B'));
  if(id==='C'&&!document.getElementById('p-C').innerHTML) renderList('C',BL.filter(x=>x.cat==='C'));
  if(id==='never'&&!document.getElementById('p-never').innerHTML) renderNever();
}

renderList('all',BL);
</script>
