function show(id){
  ['hier','table','lumen','cond'].forEach(x=>document.getElementById('p-'+x).classList.remove('active'));
  document.getElementById('p-'+id).classList.add('active');
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['hier','table','lumen','cond'][i]===id));
  if(id==='table') renderTable();
  if(id==='lumen') renderLumen();
  if(id==='cond') renderCond();
}

function renderHier(){

      <div class="hier-head" onclick="toggleH(${i})">
        <div class="hier-num" style="background:${h.bg};color:${h.color}">${h.lvl}</div>

          <div style="font-weight:500;font-size:13px">${h.title}</div>

function toggleH(i){
  const b=document.getElementById('hBody'+i);
  const a=document.getElementById('hArr'+i);
  const open=b.style.display==='none';
  b.style.display=open?'block':'none';
  a.textContent=open?'−':'+';
}

function renderTable(){
  filterTable();
}

function filterTable(){
  const q=(document.getElementById('tq').value||'').toLowerCase();
  const s=document.getElementById('ts').value;
  const p=document.getElementById('tp').value;
  const rows=DRUGS.filter(d=>{
    return (!q||d.n.toLowerCase().includes(q)) &&
      (!s||String(d.lvl)===s) &&
      (!p||d.form===p||p==='oba');
  });
  document.getElementById('tcnt').textContent='Wyświetlono: '+rows.length+' leków';
  document.getElementById('tbody').innerHTML=rows.map(d=>`
    <tr>
      <td style="font-weight:500">${d.nr}. ${d.n}</td>
      <td><span class="b ${LVL_CLS[d.lvl]}">${d.lvl} — ${['','Świętość','Własny lumen','Warunkowo','Można łączyć','Najmniej probl.'][d.lvl]}</span></td>
      <td><span class="b ${FORM_CLS[d.form]}">${d.form}</span></td>
      <td style="font-size:10px;color:var(--color-text-danger)">${d.never}</td>
      <td style="font-size:10px">${d.key}</td>
      <td style="font-size:10px;color:var(--color-text-secondary)">${d.lumen}</td>
    </tr>`).join('');
}
