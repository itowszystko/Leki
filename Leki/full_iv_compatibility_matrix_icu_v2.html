// Build lookup map
const pairMap = {};
function pKey(a,b){return a<b?`${a}_${b}`:`${b}_${a}`}
PAIRS_RAW.forEach(p=>{pairMap[pKey(p[0],p[1])]={result:p[2],cert:p[3],scenario:p[4],note:p[5]}});

const RCODES = {0:"ND",1:"TAK",2:"WARUNKOWO",3:"NIE",4:"SPRZECZNE"};
const RCLS = {0:"nd",1:"ok",2:"cond",3:"no",4:"conf"};
const MRCLS = {0:"m-nd",1:"m-ok",2:"m-cond",3:"m-no",4:"m-conf"};
const MRSYM = {0:"?",1:"✓",2:"~",3:"✗",4:"!"};

function getPair(a,b){
  if(a===b) return null;
  const k=pKey(a,b);
  return pairMap[k]||{result:0,cert:"L",scenario:"—",note:"Brak wiarygodnych danych"};
}

function show(id){
  ['matrix','pairs','critical','priority'].forEach(x=>{
    document.getElementById('p-'+x).classList.remove('active');
  });
  document.getElementById('p-'+id).classList.add('active');
  document.querySelectorAll('.tab').forEach((t,i)=>{
    t.classList.toggle('active', ['matrix','pairs','critical','priority'][i]===id);
  });
  if(id==='matrix') renderMatrix();
  if(id==='pairs') renderPairs();
  if(id==='critical') renderCrit();
  if(id==='priority') renderPrio();
}

let matrixBuilt=false;
function renderMatrix(){
  if(matrixBuilt) return;
  matrixBuilt=true;
  const wrap=document.getElementById('p-matrix');
  wrap.innerHTML='<div style="font-size:11px;color:var(--color-text-secondary);margin-bottom:8px">Kliknij komórkę aby zobaczyć szczegóły. ✓=Zgodne ✗=Niezgodne ~=Warunkowo ?=Brak danych !=Sprzeczne</div><div class="matrix-wrap" id="matrixWrap"></div><div id="matrixDetail" style="margin-top:8px;font-size:11px;padding:8px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);display:none;color:var(--color-text-secondary)"></div>';
  const mw=document.getElementById('matrixWrap');
  let html='<table><thead><tr><th class="rn" style="position:sticky;left:0;z-index:5;background:var(--color-background-secondary)">Lek</th>';
  DRUGS.forEach(d=>{html+=`<th title="${d}">${d.substring(0,8)}</th>`});
  html+='</tr></thead><tbody>';
  DRUGS.forEach((dA,i)=>{
    html+=`<tr><td class="rn" style="position:sticky;left:0;background:var(--color-background-secondary);z-index:2;font-size:9px">${dA}</td>`;
    DRUGS.forEach((dB,j)=>{
      if(i===j){html+=`<td class="m-self">—</td>`;return;}
      const p=getPair(i,j);
      const r=p?p.result:0;
      html+=`<td class="${MRCLS[r]}" onclick="showMatrixDetail(${i},${j})" title="${dA} + ${dB}">${MRSYM[r]}</td>`;
    });
    html+='</tr>';
  });
  html+='</tbody></table>';
  mw.innerHTML=html;
}

function showMatrixDetail(i,j){
  const p=getPair(i,j);
  const d=document.getElementById('matrixDetail');
  d.style.display='block';
  d.innerHTML=`<strong>${DRUGS[i]} + ${DRUGS[j]}</strong><br>
Wynik: <span class="b ${RCLS[p.result]}">${RCODES[p.result]}</span> &nbsp;
Pewność: ${p.cert==='H'?'<span class="b hi">Wysoka</span>':p.cert==='M'?'<span class="b med">Umiarkowana</span>':'<span class="b lo">Niska</span>'}<br>
Scenariusz: ${p.scenario||'—'}<br>${p.note}`;
}

function renderPairs(){
  const q=(document.getElementById('pairQ')?.value||'').toLowerCase();
  const res=document.getElementById('pairRes')?.value||'';
  const cert=document.getElementById('pairCert')?.value||'';
  const rows=PAIRS_RAW.filter(p=>{
    const a=DRUGS[p[0]].toLowerCase(), b=DRUGS[p[1]].toLowerCase();
    const rcode=RCODES[p[2]];
    return (!q||a.includes(q)||b.includes(q)) &&
      (!res||rcode===res) &&
      (!cert||p[3]===cert);
  });
  document.getElementById('pairCount').textContent=`Wyświetlono: ${rows.length} par`;
  document.getElementById('pairsBody').innerHTML=rows.map(p=>`
    <tr>
      <td style="font-weight:500">${DRUGS[p[0]]}</td>
      <td style="font-weight:500">${DRUGS[p[1]]}</td>
      <td><span class="b ${RCLS[p[2]]}">${RCODES[p[2]]}</span></td>
      <td><span class="b ${p[3]==='H'?'hi':p[3]==='M'?'med':'lo'}">${p[3]==='H'?'Wysoka':p[3]==='M'?'Umiarkowana':'Niska'}</span></td>
      <td style="font-size:10px;color:var(--color-text-secondary)">${p[4]||'—'}</td>
      <td style="font-size:10px">${p[5]}</td>
    </tr>`).join('');
}

let critTypeFilter='all';
function renderCrit(){
  if(!document.getElementById('critChips').innerHTML){
    const types=[['all','Wszystkie'],['precipitate','Wytrącenie'],['degradation','Degradacja'],['adsorption','Adsorpcja'],['pharmacokinetic','Farmakokinet.'],['QT_prolongation','QT'],['incompatibility','Niezgodność']];
    document.getElementById('critChips').innerHTML=types.map(([v,l])=>`<button class="chip${v==='all'?' on':''}" onclick="setCritType('${v}',this)">${l}</button>`).join('');
  }
  const q=(document.getElementById('critQ')?.value||'').toLowerCase();
  const lev=document.getElementById('critLevel')?.value||'';
  const rows=CRITS.filter(c=>{
    return (critTypeFilter==='all'||c.type===critTypeFilter) &&
      (!lev||c.level===lev) &&
      (!q||c.pair.toLowerCase().includes(q)||c.note?.toLowerCase().includes(q)||c.prob.toLowerCase().includes(q));
  });
  document.getElementById('critCount').textContent=`Wyświetlono: ${rows.length} kombinacji`;
  document.getElementById('critList').innerHTML=rows.map(c=>`
    <div class="crit-card ${c.level}">
      <div class="crit-pair">${c.pair}</div>
      <div class="crit-body">
        <b>Problem:</b> ${c.prob}<br>
        <b>Mechanizm:</b> ${c.mech}<br>
        <b>Środowisko:</b> ${c.env} &nbsp;|&nbsp; <b>Stężenia:</b> ${c.conc}<br>
        <b>Czas:</b> ${c.time} &nbsp;|&nbsp; <b>Widoczne makroskopowo:</b> ${c.visible}<br>
        <b>Znaczenie kliniczne:</b> ${c.clinical}<br>
        <b>Zalecenie:</b> ${c.rec}
      </div>
    </div>`).join('');
}
function setCritType(v,btn){
  critTypeFilter=v;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));
  btn.classList.add('on');
  renderCrit();
}
