<h2 style="position:absolute;width:1px;height:1px;overflow:hidden">Brutalna praktyka OIT — brak lumenów, pacjent niestabilny</h2>

<div class="tabs">
  <button class="tab active" onclick="show('connect')">Co łączę</button>
  <button class="tab" onclick="show('never')">Czego nigdy</button>
  <button class="tab" onclick="show('accept')">Akceptowalna strata</button>
  <button class="tab" onclick="show('damage')">Ograniczenie szkód</button>
  <button class="tab" onclick="show('bolus')">Bolus zamiast linii</button>
</div>

<div id="p-connect" class="panel active"></div>
<div id="p-never" class="panel"></div>
<div id="p-accept" class="panel"></div>
<div id="p-damage" class="panel"></div>
<div id="p-bolus" class="panel"></div>

<script>
function show(id){
  ['connect','never','accept','damage','bolus'].forEach(x=>document.getElementById('p-'+x).classList.remove('active'));
  document.getElementById('p-'+id).classList.add('active');
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['connect','never','accept','damage','bolus'][i]===id));
}

document.getElementById('p-connect').innerHTML=`
<div class="section-h">Co połączę mimo ryzyka — priorytet ratowania życia</div>

<div class="card amber">

  <div class="card-body">
    Trissel's potwierdza Y-site. Robię to codziennie. <b>Warunek:</b> lumen dystalny, niski przepływ nośnika minimum 5 ml/h, bez dodatkowych leków przez ten port podczas aktywnego wlewu.
    <br><br><b>Ryzyko które akceptuję:</b> kontaminacja hemodynamiczna przy zmianie dawki jednego z leków przez wpływ na przepływ drugiego. Monitoruję BP/HR i odpowiednio titruje.
  </div>
</div>

<div class="card amber">
  <div class="card-title">Noradrenalina + dobutamina — Y-site</div>
  <div class="card-body">
    Trissel's: zgodne. Klinicznie stosowane. <b>Warunek:</b> oddzielne strzykawki i pompy, tylko Y-site — nie mieszam w jednym pojemniku. Każda zmiana dawki jednej z nich wpływa na przepływ drugiej przez port — uwzględniam to w ocenie odpowiedzi hemodynamicznej.
  </div>
</div>

<div class="card amber">
  <div class="card-title">Antybiotyki sekwencyjnie przez jeden lumen — pip+taz → flush → wankomycyna → flush → meropenem</div>
  <div class="card-body">
    <b>Zasada bezwzględna:</b> 20 ml NaCl między każdym. Tylko sekwencyjnie, nigdy jednocześnie. Amikacyny tu nie ma — amikacyna idzie przez wenflon obwodowy, to jedyna alternatywa.
    <br><br><b>Ryzyko które akceptuję:</b> marginalne resztki w dead space. Przy 20 ml flush — akceptowalne. Monitoruję TDM amikacyny.
  </div>
</div>

<div class="card amber">
  <div class="card-title">Midazolam+fentanyl (strzykawka) + bolus deksametazonu lub hydrokortyzon przez ten sam lumen</div>
  <div class="card-body">
    Trissel's: zgodne Y-site. <b>Warunek:</b> bez furosemidu i NaHCO₃ przez ten lumen. Bolus kortykosteroidu przez linię sedacyjną — fizycznie bezpieczny przy tych lekach.
  </div>
</div>

<div class="card amber">
  <div class="card-title">Lewetyracetam przez dowolny dostępny lumen (sekwencyjnie z prawie wszystkim)</div>
  <div class="card-body">
    Najszerzej kompatybilny lek IV w tym zestawieniu. W sytuacji braku lumenów — lewetyracetam dorzucam do niemal każdej linii (poza fenytoiną i propofol). Bezproblemowy.
  </div>
</div>

<div class="card amber">
  <div class="card-title">Furosemid bolus przez lumen objawowy — gdy inne wlewy są wstrzymane na chwilę</div>
  <div class="card-body">
    Zatrzymuję aktywny wlew, przepłukuję 10 ml NaCl, daję furosemid, przepłukuję 10 ml NaCl, wznawiam wlew. <b>Trwa 3 minuty.</b> Akceptowalne.
  </div>
</div>`;

document.getElementById('p-accept').innerHTML=`
<div class="section-h">Gdzie strata skuteczności jest akceptowalna — hierarchia ważności</div>

<div class="card green">
  <div class="card-title">Amiodaron przez CVC PVC (zamiast non-PVC) — przy bezpośrednim zagrożeniu życia arytmią</div>
  <div class="card-body">
    Adsorpcja amiodaronu do PVC jest udokumentowana, ale jej kliniczne znaczenie przy krótkotrwałym podaniu jest zmienne i zależy od stężenia i czasu kontaktu. <b>Akceptuję</b> przy hemodynamicznie niestabilnej arytmii wymagającej natychmiastowego leczenia — podaję przez dostępną linię, wymieniam na non-PVC przy pierwszej okazji. <b>Uwaga: nie kompensuj automatycznie dawki — brak danych pozwalających na wiarygodne wyliczenie korekty dawki przy adsorpcji PVC.</b> Monitoruj efekt kliniczny i EKG.
  </div>
</div>

<div class="card green">
  <div class="card-title">Tigecyklina bez osłony przez pierwsze minuty (nagłe podanie)</div>
  <div class="card-body">
    Fotodegradacja tigecykliny zachodzi bez zmiany barwy roztworu — szybkość zależy od natężenia światła (szczególnie jasne sale OIT). <b>Akceptuję</b> krótkotrwałą ekspozycję wyłącznie przy bezwzględnie nagłym włączeniu terapii, gdy brak czasu na przygotowanie osłony. <b>Natychmiast zakładam osłonę</b> i nie powtarzam tego przy kolejnych dawkach. Nie podaję tigecykliny bez osłony jako rutyny.

<div class="card green">

document.getElementById('p-damage').innerHTML=`
<div class="section-h">Jak ograniczę szkody — konkretnie, w kolejności</div>

<div class="card blue">
  <div class="card-title">1. Wenflon 18G — rozwiązuje 80% problemów z lumenami</div>
  <div class="card-body">
    Amikacyna, fenytoina, CaCl₂, NaHCO₃, Fibryga/Octaplex — każdy z tych leków idzie przez wenflon. <b>Założenie wenflonu zajmuje 2 minuty.</b> To jest najszybsza i najtańsza interwencja redukująca ryzyko. Przy niestabilnym pacjencie — grzbiet ręki, przedramię, stopa, żyła szyjna zewnętrzna. Gdziekolwiek.
  </div>
</div>

<div class="card blue">
  <div class="card-title">2. Sekwencja zamiast jednoczesności — zawsze tam gdzie możliwe</div>
  <div class="card-body">
    Pip+taz podaję co 8h przez 30 min. Amikacyna raz dziennie. Ceftriakson raz dziennie. <b>Te leki rzadko muszą iść naprawdę jednocześnie.</b> Planuję sekwencję tak żeby okna ich aktywności w dead space nie zachodziły na siebie. 20 ml NaCl między nimi — wystarczy przy odpowiednim odstępie.
  </div>
</div>

<div class="card blue">
  <div class="card-title">3. Minimalizacja dead space — fizycznie</div>
  <div class="card-body">
    Skracam dren od trójnika do portu CVC do minimum. Każdy centymetr to dead space. Przy 50 cm drenu 1 mm ID — to 0,4 ml. Przy 20 cm — 0,16 ml. <b>Różnica małostkowa w normalnych warunkach, istotna przy lekach presyjnych i klindamycynie.</b>
  </div>
</div>

<div class="card blue">
  <div class="card-title">4. Priming każdej nowej strzykawki — bez wyjątku</div>
  <div class="card-body">
    Zmiana strzykawki noradrenaliny: nowa strzykawka podłączona do przedłużacza, tłok przesunięty aż lek pojawi się na końcówce złącza — <b>zanim</b> podłączę do pacjenta. Eliminuje opóźnienie i niecelowy bolus. 20 sekund, każda zmiana.
  </div>
</div>

<div class="card blue">
  <div class="card-title">5. Jeden lumen presyjny — nienaruszalny</div>
  <div class="card-body">
    Przy braku lumenów: lumen z katecholaminą jest <b>zamknięty dla wszystkiego innego</b>. Nie wolno mi się skusić żeby "tylko na chwilę" dać NaHCO₃ przez ten port. Zanim cokolwiek dam przez ten lumen — katecholamina musi być wstrzymana, linia przepłukana 20 ml, a to nie jest opcja przy niestabilnym pacjencie.
  </div>
</div>

<div class="card blue">
  <div class="card-title">6. Zamienniki farmakologiczne gdy brak bezpiecznej drogi</div>
  <div class="card-body">

    Klindamycyna bez pompy → <b>odroczenie do zwolnienia pompy</b> (nie gram grawitacją).<br>

  </div>
</div>`;
