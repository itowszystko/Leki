function renderLConfig(data, panelId){
  const el = document.getElementById('p-'+panelId);
  const riskCls = data.risk==='WYSOKI'?'b-r':data.risk==='UMIARKOWANY'?'b-o':'b-g';
  let html = `
    <div style="margin-bottom:10px">
      <div style="font-size:15px;font-weight:500;margin-bottom:3px">${data.title}</div>
      <div style="font-size:12px;color:var(--color-text-secondary);margin-bottom:6px">${data.subtitle}</div>
      <span class="b ${riskCls}">Ryzyko kliniczne: ${data.risk}</span>
    </div>
    <div class="lumen-strip">`;

  data.lumens.forEach(l=>{
    html += `<div class="lumen-card" style="border-top:3px solid ${l.tc}">
      <div class="lumen-card-head" style="background:${l.color};color:${l.tc}">${l.id}: ${l.label}</div>
      <div class="lumen-card-body">
        <div style="font-size:10px;font-weight:500;color:var(--color-text-primary);margin-bottom:3px">${l.title}</div>
        ${l.must.map(m=>`<div class="must">+ ${m}</div>`).join('')}
        <div style="margin-top:5px">${l.avoid.map(a=>`<div class="warn">− ${a}</div>`).join('')}</div>
        <div style="margin-top:5px" class="note">${l.note}</div>
      </div>
    </div>`;
  });
  html += '</div>';

  if(data.additional && data.additional.length){
    html += '<div style="font-size:11px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.04em;margin:8px 0 5px">Poza standardowymi lumenami / decyzje dodatkowe</div>';
    data.additional.forEach(a=>{
      const cls = a.type==='d'?'comp-d':a.type==='w'?'comp-w':a.type==='i'?'comp-i':'comp-a';
      html += `<div class="comp-row ${cls}">${a.text}</div>`;
    });
  }
  if(data.crisis){
    html += `<div class="comp-row comp-d" style="margin-top:8px;font-weight:500">${data.crisis}</div>`;
  }
  el.innerHTML = html;
}

function renderBolus(){
  const el = document.getElementById('p-bolus');
  const pump = BOLUS_DATA.filter(d=>d.pump && !d.bolus);
  const pumpBolus = BOLUS_DATA.filter(d=>d.pump && d.bolus);
  const bolusOnly = BOLUS_DATA.filter(d=>!d.pump && d.bolus);
  const special = BOLUS_DATA.filter(d=>!d.pump && !d.bolus);

  function mkTable(rows, title, cls){
    return `<div style="font-size:11px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.04em;margin:12px 0 5px">${title}</div>
    <div style="overflow:auto;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);margin-bottom:4px">
    <table><thead><tr><th>Lek</th><th>Forma</th><th>Metoda</th><th>Ryzyko</th><th>Prewencja</th></tr></thead><tbody>
    ${rows.map(d=>`<tr>
      <td style="font-weight:500">${d.n}</td>
      <td><span class="b ${cls}">${d.pump?'Pompa':''} ${d.bolus?'Bolus':''}</span></td>
      <td style="font-size:10px">${d.method}</td>
      <td style="font-size:10px;color:var(--color-text-danger)">${d.danger}</td>
      <td style="font-size:10px;color:var(--color-text-secondary)">${d.prevent}</td>
    </tr>`).join('')}
    </tbody></table></div>`;
  }

  el.innerHTML =
    mkTable(pump,'Wyłącznie pompa — bolus absolutnie NIE','b-r') +
    mkTable(pumpBolus,'Pompa ciągła + bolus warunkowo dopuszczalny','b-o') +
    mkTable(bolusOnly,'Bolus bez pompy — standardowe podanie','b-g') +
    mkTable(special,'Wolny wlew / protokół — nie bolus, nie standardowa pompa','b-b') +
    `<div class="comp-row comp-d" style="margin-top:10px">
    <b>Jak unikać przypadkowych bolusów:</b><br>
    1. Każda zmiana strzykawki presyjnej = prime nowej strzykawki do momentu wypłynięcia leku z końcówki (bez powietrza, bez starego nośnika).<br>
    2. Flush przez linię presyjną lub sedacyjną = NIGDY ręczny push. Jeśli konieczny — zatrzymaj wlew, powolny flush 0,9 NaCl, wznów wlew.<br>
    3. Długi dren + niski przepływ = lek kumuluje się w dead space. Każda zmiana pozycji strzykawki lub trójnika = niecelowy bolus.<br>
    4. Minimalizuj długość drenu od trójnika do cewnika. Każdy centymetr to dead space.<br>
    5. Nie używaj grawitacji do przepłukiwania linii presyjnej lub sedacyjnej.
    </div>`;
}

function renderComp(){
  const el = document.getElementById('p-comp');
  const acc = COMP_DATA.filter(c=>c.type==='a');
  const warn = COMP_DATA.filter(c=>c.type==='w');
  const danger = COMP_DATA.filter(c=>c.type==='d');
  function mkComp(rows, title, cls, hdr){
    return `<div class="section-h">${title}</div>` + rows.map(c=>`
      <div class="comp-row ${cls}" style="margin-bottom:5px">
        <div style="font-weight:500;margin-bottom:3px">${c.pair}</div>
        <div>${c.why}</div>
        <div style="margin-top:3px"><b>Kiedy:</b> ${c.when}</div>
        ${c.limit?`<div style="margin-top:2px"><b>Limit:</b> ${c.limit}</div>`:''}
      </div>`).join('');
  }
  el.innerHTML =
    mkComp(acc,'Kompromisy akceptowalne — bezpieczne przy zachowaniu zasad','comp-a','ok') +
    mkComp(warn,'Kompromisy warunkowe — ostatnia deska ratunku z nadzorem','comp-w','warn') +
    mkComp(danger,'Kompromisy niedopuszczalne — tylko w sytuacji bez alternatywy i z pełnym monitoringiem','comp-d','danger');
}

function show(id){
  ['l3','l4','l5','bolus','comp'].forEach(x=>document.getElementById('p-'+x).classList.remove('active'));
  document.getElementById('p-'+id).classList.add('active');
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['l3','l4','l5','bolus','comp'][i]===id));
  if(id==='bolus') renderBolus();
  if(id==='comp') renderComp();
}
